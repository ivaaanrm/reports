services:
  mongo:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: reports
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    expose:
      - "8000"
    environment:
      MONGODB_URL: mongodb://mongo:27017
      DATABASE_NAME: reports
      REDIS_URL: redis://redis:6379/0
      PDF_CACHE_DIR: /app/generated-pdfs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - pdf_cache:/app/generated-pdfs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pdf-reports.rule=Host(`reports.romerolabs.es`)"
      - "traefik.http.routers.pdf-reports.entrypoints=websecure"
      - "traefik.http.routers.pdf-reports.tls.certresolver=letsencrypt"
      - "traefik.http.services.pdf-reports.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"
    restart: unless-stopped

volumes:
  mongo_data:
  pdf_cache:

networks:
  internal:
  traefik-public:
    external: true
